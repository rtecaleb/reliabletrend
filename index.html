<!DOCTYPE html>

  <title>Reliable Trend Enterprises LLC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f9f9f9; color: #222; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 18px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    header .brand { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #111; text-decoration: none; }
    nav a { text-decoration: none; color: #444; font-size: 0.9rem; margin-left: 24px; transition: color 0.2s; }
    nav a:hover { color: #000; }
    .hero { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 80px 24px; }
    .hero h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -0.02em; text-transform: uppercase; color: #111; margin-bottom: 16px; }
    .hero p { font-size: 1.2rem; color: #555; margin-bottom: 40px; }
    .hero .cta { display: inline-block; background: #111; color: #fff; padding: 14px 36px; border-radius: 4px; text-decoration: none; font-size: 0.95rem; font-weight: 600; letter-spacing: 0.04em; transition: background 0.2s; }
    .hero .cta:hover { background: #333; }
    .contact { background: #fff; border-top: 1px solid #e0e0e0; padding: 60px 24px; text-align: center; }
    .contact h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 10px; }
    .contact p { color: #555; margin-bottom: 20px; font-size: 1rem; }
    .contact a { color: #111; font-weight: 600; text-decoration: underline; }
    footer { background: #111; color: #aaa; text-align: center; padding: 20px 24px; font-size: 0.82rem; }
    footer a { color: #ccc; text-decoration: none; margin: 0 10px; }
    footer a:hover { color: #fff; }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/">Reliable Trend Enterprises LLC</a>
    <nav>
      <a href="/">Home</a>
      <a href="/privacy-policy.html">Privacy Policy</a>
